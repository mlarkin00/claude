name: Notify active-skills-plugin

# Install this at .github/workflows/notify-plugin.yml in mlarkin00/agent-skills.
# On any push touching active-skills/**, it pings mlarkin00/claude so the
# active-skills-plugin re-syncs immediately (the plugin also polls daily as a
# fallback, so this is an optimization, not a hard dependency).
#
# Setup: add a PAT with `repo` scope on mlarkin00/claude as the Actions secret
# CLAUDE_REPO_TOKEN in THIS (agent-skills) repo.
on:
  push:
    branches: [main]
    paths:
      - "active-skills/**"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the marketplace to re-sync
        env:
          TOKEN: ${{ secrets.CLAUDE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::warning::CLAUDE_REPO_TOKEN not set — skipping dispatch." \
                 "The plugin's daily poll will still pick up this change."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mlarkin00/claude/dispatches \
            -d '{"event_type":"active-skills-updated"}')
          echo "dispatch HTTP $code"
          # 204 = accepted. Anything else is a real failure worth surfacing.
          [ "$code" = "204" ]
