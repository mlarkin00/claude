name: Release

on:
  push:
    branches:
      - main

# Avoid feedback loop: the bot push below is skipped via the actor guard.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump changed plugins
        id: bump
        run: |
          set -euo pipefail

          MARKETPLACE=".claude-plugin/marketplace.json"
          # active-skills is deliberately absent: sync-active-skills.yml owns its
          # versioning and releases.
          PLUGINS="agent-memory llm-wiki memory-bank"

          # Files changed in this push (handles first-push / force-push gracefully).
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            CHANGED=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
          else
            CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi
          echo "Changed files:"; echo "$CHANGED"

          TAGS=""
          for p in $PLUGINS; do
            # Ignore doc-only and workflow-only changes for this plugin.
            if ! echo "$CHANGED" | grep -E "^$p/" | grep -vE "^$p/(README\.md|\.github/)" | grep -q .; then
              echo "No release-relevant changes for $p, skipping."
              continue
            fi

            MANIFEST="$p/.claude-plugin/plugin.json"
            VERSION=$(jq -r '.version' "$MANIFEST")
            IFS='.' read -r major minor patch <<< "$VERSION"
            NEW="$major.$minor.$((patch + 1))"
            echo "$p: $VERSION -> $NEW"

            jq --arg v "$NEW" '.version = $v' "$MANIFEST" > tmp && mv tmp "$MANIFEST"
            jq --arg n "$p" --arg v "$NEW" \
              '(.plugins[] | select(.name == $n) | .version) = $v' \
              "$MARKETPLACE" > tmp && mv tmp "$MARKETPLACE"

            git add "$MANIFEST" "$MARKETPLACE"
            TAGS="$TAGS $p-v$NEW"
          done

          echo "tags=$(echo $TAGS | xargs)" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, release
        if: steps.bump.outputs.tags != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MSG="chore: release$(for t in ${{ steps.bump.outputs.tags }}; do printf ' %s' "$t"; done)"
          git commit -m "$MSG"

          for t in ${{ steps.bump.outputs.tags }}; do
            git tag "$t"
          done

          git push origin main
          git push origin --tags

          for t in ${{ steps.bump.outputs.tags }}; do
            gh release create "$t" --title "$t" --generate-notes
          done
