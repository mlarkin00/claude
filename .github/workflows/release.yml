name: Release

on:
  push:
    branches:
      - main

# Avoid feedback loop: the bot push below is skipped via the actor guard.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump changed plugins
        id: bump
        run: |
          set -euo pipefail

          MARKETPLACE=".claude-plugin/marketplace.json"
          # active-skills is deliberately absent: sync-active-skills.yml owns its
          # versioning and releases.
          PLUGINS="agent-memory llm-wiki memory-bank skill-usage"

          # Files changed in this push (handles first-push / force-push gracefully).
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            CHANGED=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}")
          else
            CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi
          echo "Changed files:"; echo "$CHANGED"

          TAGS=""
          for p in $PLUGINS; do
            # Ignore changes that cannot affect what a user installs: docs,
            # workflows, and .agents/ (the plugin's own backlog and notes —
            # agent-facing project metadata, never consumed from an install).
            # A release burns a version and invalidates every version-keyed
            # cache, so editing a TODO must not cut one.
            # The per-plugin briefing files are the same class: they brief an
            # agent working IN this repo and neither runtime loads them from an
            # install ("CLAUDE.md at the plugin root is not loaded as project
            # context" — claude plugin validate). Anchored to the plugin root, so
            # a skill's own SKILL.md or nested docs still release normally.
            if ! echo "$CHANGED" | grep -E "^$p/" | grep -vE "^$p/(README\.md|AGENTS\.md|CLAUDE\.md|GEMINI\.md|\.github/|\.agents/)" | grep -q .; then
              echo "No release-relevant changes for $p, skipping."
              continue
            fi

            # A plugin serves both runtimes from one directory and carries a
            # manifest for each: .claude-plugin/plugin.json for Claude Code and
            # plugin.json for Antigravity. They MUST hold the same version, so
            # both are written here. Writing only the Claude one is what let the
            # Antigravity manifests drift several minor versions behind.
            CLAUDE_MANIFEST="$p/.claude-plugin/plugin.json"
            AGY_MANIFEST="$p/plugin.json"

            VERSION=$(jq -r '.version' "$CLAUDE_MANIFEST")
            IFS='.' read -r major minor patch <<< "$VERSION"
            NEW="$major.$minor.$((patch + 1))"
            echo "$p: $VERSION -> $NEW"

            # The Antigravity manifest is optional: a plugin may not ship one,
            # and under `set -euo pipefail` a jq read of a missing file would
            # abort the whole release step rather than skip one file.
            MANIFESTS="$CLAUDE_MANIFEST"
            if [ -f "$AGY_MANIFEST" ]; then
              MANIFESTS="$MANIFESTS $AGY_MANIFEST"
            else
              echo "::notice::$p has no Antigravity manifest ($AGY_MANIFEST); bumping the Claude manifest only."
            fi

            for m in $MANIFESTS; do
              jq --arg v "$NEW" '.version = $v' "$m" > tmp && mv tmp "$m"
            done
            jq --arg n "$p" --arg v "$NEW" \
              '(.plugins[] | select(.name == $n) | .version) = $v' \
              "$MARKETPLACE" > tmp && mv tmp "$MARKETPLACE"

            git add $MANIFESTS "$MARKETPLACE"
            TAGS="$TAGS $p-v$NEW"
          done

          echo "tags=$(echo $TAGS | xargs)" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, release
        if: steps.bump.outputs.tags != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MSG="chore: release$(for t in ${{ steps.bump.outputs.tags }}; do printf ' %s' "$t"; done)"
          git commit -m "$MSG"

          for t in ${{ steps.bump.outputs.tags }}; do
            git tag "$t"
          done

          git push origin main
          git push origin --tags

          for t in ${{ steps.bump.outputs.tags }}; do
            gh release create "$t" --title "$t" --generate-notes
          done
