name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - ".github/**"
      - "user-interactive/**"
      - "topics/**"
      - "transcripts/**"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-bump version
        id: bump
        run: |
          # Read current version from gemini-extension.json
          VERSION=$(jq -r '.version' gemini-extension.json)
          echo "Current version: $VERSION"

          # Increment patch version
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update gemini-extension.json
          jq --arg v "$NEW_VERSION" '.version = $v' gemini-extension.json > gemini-extension.json.tmp && mv gemini-extension.json.tmp gemini-extension.json

          # Update .claude-plugin/plugin.json if it exists
          if [ -f .claude-plugin/plugin.json ]; then
            jq --arg v "$NEW_VERSION" '.version = $v' .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp && mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gemini-extension.json .claude-plugin/plugin.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push origin main

      - name: Create Tag
        run: |
          git tag v${{ steps.bump.outputs.version }}
          git push origin v${{ steps.bump.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
