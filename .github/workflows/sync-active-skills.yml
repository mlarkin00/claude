name: Sync active-skills

# Keeps active-skills/skills/ mirrored to mlarkin00/agent-skills (active-skills/).
# Runs on: a repository_dispatch from the source repo (instant), a daily poll
# (fallback), and manual dispatch. When the mirror changes, bumps the plugin
# version, updates marketplace.json, commits, tags, and cuts a release.
on:
  repository_dispatch:
    types: [active-skills-updated]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC, fallback if the dispatch is missing

concurrency:
  group: sync-active-skills
  cancel-in-progress: false

env:
  SOURCE_REPO: mlarkin00/agent-skills
  SOURCE_PATH: active-skills
  PLUGIN: active-skills

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout marketplace
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The source repo is private, so authenticate with a read-scoped PAT
      # (secret SKILLS_SRC_TOKEN). The default GITHUB_TOKEN is scoped to this repo
      # and gets a 404 on the source. actions/checkout handles auth cleanly; a bare
      # `git clone` prompts for credentials on the runner.
      - name: Checkout source skills repo
        uses: actions/checkout@v4
        with:
          repository: mlarkin00/agent-skills
          token: ${{ secrets.SKILLS_SRC_TOKEN }}
          path: .source
          fetch-depth: 1
          persist-credentials: false

      - name: Record source revision
        run: echo "SOURCE_SHA=$(git -C .source rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Mirror skills into the plugin
        run: |
          set -euo pipefail
          SRC=".source/${SOURCE_PATH}/"
          DEST="${PLUGIN}/skills/"
          if [ ! -d "$SRC" ]; then
            echo "::error::Source path $SRC not found in ${SOURCE_REPO}"; exit 1
          fi
          mkdir -p "$DEST"
          # Exact mirror (add/update/delete). Anchored '/.gitignore' drops only the
          # source repo's top-level ignore file, not any skill's nested one.
          rsync -a --delete --exclude='/.gitignore' "$SRC" "$DEST"
          bash "${PLUGIN}/scripts/gen-readme.sh"

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git status --porcelain -- "${PLUGIN}" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Skill changes detected:"; git status --porcelain -- "${PLUGIN}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date with ${SOURCE_REPO}@${SOURCE_SHA}."
          fi

      - name: Bump, commit, tag, release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MANIFEST="${PLUGIN}/.claude-plugin/plugin.json"
          MARKETPLACE=".claude-plugin/marketplace.json"

          VERSION=$(jq -r '.version' "$MANIFEST")
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW="$major.$minor.$((patch + 1))"
          echo "${PLUGIN}: $VERSION -> $NEW"

          jq --arg v "$NEW" '.version = $v' "$MANIFEST" > tmp && mv tmp "$MANIFEST"
          jq --arg n "$PLUGIN" --arg v "$NEW" \
            '(.plugins[] | select(.name == $n) | .version) = $v' \
            "$MARKETPLACE" > tmp && mv tmp "$MARKETPLACE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${PLUGIN}" "$MARKETPLACE"
          git commit -m "chore(${PLUGIN}): sync skills from ${SOURCE_REPO}@${SOURCE_SHA:0:7} (v$NEW)"

          # Push to main, rebasing if another writer (release.yml bot, memory bot,
          # a human) landed a commit during this run. Only sync/ bumps this plugin's
          # version and concurrency serializes syncs, so a rebase only pulls in
          # unrelated changes and never touches $NEW. Tag AFTER the push so the tag
          # points at the final (possibly rebased) commit.
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then pushed=true; break; fi
            echo "push rejected (attempt $attempt/5); rebasing onto origin/main"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::rebase conflict against origin/main; will retry on next run"
              exit 1
            fi
            sleep 3
          done
          if [ "$pushed" != true ]; then
            echo "::error::could not fast-forward main after 5 attempts"; exit 1
          fi

          TAG="${PLUGIN}-v$NEW"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" \
            --notes "Synced \`${SOURCE_PATH}/\` from ${SOURCE_REPO}@${SOURCE_SHA}."
