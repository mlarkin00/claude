name: Sync active-skills

# Mirrors the skills from mlarkin00/active-skills (the skills source of truth)
# into active-skills/skills/ here, so this marketplace is the single install
# point for both runtimes: Claude via the marketplace entry, Antigravity via a
# bulk `agy plugin install` of this repo, which needs the plugin physically
# present.
#
# SCOPE: only active-skills/skills/ is written. active-skills/ IS A REAL PLUGIN
# and everything beside skills/ — both manifests, scripts/, sidecars/, tests/,
# README.md, AGENTS.md — is hand-maintained here and MUST NOT be touched by this
# workflow. The rsync destination is skills/, so --delete cannot reach them.
#
# The source repo holds skills ONLY (each skill a top-level directory with a
# SKILL.md) and has no manifest. This workflow therefore OWNS the version: it
# patch-bumps both manifests and marketplace.json on every change. Nothing is
# hand-bumped, so nothing can be forgotten.
#
# Runs on: a repository_dispatch from the source repo (instant), a daily poll
# (fallback), and manual dispatch.
on:
  repository_dispatch:
    types: [active-skills-updated]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC, fallback if the dispatch is missing

concurrency:
  group: sync-active-skills
  cancel-in-progress: false

env:
  SOURCE_REPO: mlarkin00/active-skills
  PLUGIN: active-skills

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout marketplace
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The source repo is public, so the default GITHUB_TOKEN can read it — no PAT.
      - name: Checkout source skills repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          path: .source
          fetch-depth: 1
          persist-credentials: false

      - name: Record source revision
        run: echo "SOURCE_SHA=$(git -C .source rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Mirror the source skills into the plugin
        run: |
          set -euo pipefail
          DEST="${PLUGIN}/skills/"
          mkdir -p "$DEST"

          # A skill is a top-level directory in the source repo containing a
          # SKILL.md. Everything else at that root — .github/, README.md,
          # AGENTS.md, a future docs/ — is not ours and is skipped, so the
          # authoring repo can grow non-skill content without shipping phantom
          # skills. (Antigravity installs EVERY entry under skills/ as a skill.)
          #
          # rsync cannot test for a sibling file, so the rule set is generated
          # here and merged in. `- /*` is anchored, matching only top-level
          # entries, so a skill's own files are never tested against it.
          FILTER="$(mktemp)"
          skipped=""
          count=0
          for d in .source/*/; do
            name="$(basename "$d")"
            if [ -f "${d}SKILL.md" ]; then
              printf '+ /%s/\n' "$name" >> "$FILTER"
              count=$((count + 1))
            else
              skipped="${skipped} ${name}"
            fi
          done
          printf -- '- /*\n' >> "$FILTER"

          # An empty list would make --delete wipe every skill from the plugin
          # and commit it as a success. Zero skills is never legitimate.
          if [ "$count" -eq 0 ]; then
            echo "::error::No skills found in ${SOURCE_REPO}@${SOURCE_SHA} —" \
              "refusing to sync, as --delete would empty ${DEST}."
            exit 1
          fi
          if [ -n "$skipped" ]; then
            echo "::notice::Skipped non-skill entries (no SKILL.md):${skipped}"
          fi

          rsync -a --delete --filter="merge $FILTER" ".source/" "$DEST"
          echo "Synced ${count} skills."

      - name: Regenerate the README inventory
        run: bash "${PLUGIN}/scripts/gen-readme.sh"

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git status --porcelain -- "${PLUGIN}" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"; git status --porcelain -- "${PLUGIN}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date with ${SOURCE_REPO}@${SOURCE_SHA}."
          fi

      - name: Sync version, commit, tag, release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CLAUDE_MANIFEST="${PLUGIN}/.claude-plugin/plugin.json"
          AGY_MANIFEST="${PLUGIN}/plugin.json"
          MARKETPLACE=".claude-plugin/marketplace.json"

          # This workflow owns the version. The source repo holds skills only and
          # has no manifest, so there is nothing to read from it and nothing for
          # an author to forget to bump. Both runtimes are served by this one
          # plugin, so both manifests carry the SAME version.
          #
          # The bump must be here and nowhere else: release.yml excludes
          # active-skills precisely because a second versioner could rebase onto
          # a competing bump and produce duplicate active-skills-v<N> tags.
          CUR=$(jq -r '.version' "$CLAUDE_MANIFEST")
          VERSION=$(echo "$CUR" | awk -F. '{printf "%d.%d.%d", $1, $2, $3 + 1}')
          echo "Bumping ${CUR} -> ${VERSION}"

          for m in "$CLAUDE_MANIFEST" "$AGY_MANIFEST"; do
            jq --arg v "$VERSION" '.version = $v' "$m" > tmp && mv tmp "$m"
          done
          jq --arg n "$PLUGIN" --arg v "$VERSION" \
            '(.plugins[] | select(.name == $n) | .version) = $v' \
            "$MARKETPLACE" > tmp && mv tmp "$MARKETPLACE"

          git add "$CLAUDE_MANIFEST" "$AGY_MANIFEST"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${PLUGIN}" "$MARKETPLACE"
          git commit -m "chore(${PLUGIN}): sync from ${SOURCE_REPO}@${SOURCE_SHA:0:7} (v$VERSION)"

          # Push to main, rebasing if another writer landed a commit during this run.
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then pushed=true; break; fi
            echo "push rejected (attempt $attempt/5); rebasing onto origin/main"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::rebase conflict against origin/main; will retry on next run"
              exit 1
            fi
            sleep 3
          done
          if [ "$pushed" != true ]; then
            echo "::error::could not fast-forward main after 5 attempts"; exit 1
          fi

          # Tag and release only when the version is new, so a content-only sync
          # (no bump) does not collide with an existing tag.
          TAG="${PLUGIN}-v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1 || \
             git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping tag and release."
          else
            git tag "$TAG"
            git push origin "$TAG"
            gh release create "$TAG" --title "$TAG" \
              --notes "Synced from ${SOURCE_REPO}@${SOURCE_SHA}."
          fi
